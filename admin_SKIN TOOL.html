
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RG SKIN TOOL - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="container mx-auto p-4 md:p-8">
        <h1 class="text-4xl font-bold mb-8 text-center text-gray-700">RG SKIN TOOL Admin Panel</h1>
        
        <!-- Forms Section -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-2xl font-bold mb-4 border-b pb-2">Password & Links</h2>
                <form id="pass-form" class="space-y-4">
                    <input type="text" id="new-password" placeholder="New Password" class="w-full px-3 py-2 border rounded-md">
                    <input type="text" id="get-pass-link" placeholder="Get Password Link" class="w-full px-3 py-2 border rounded-md">
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">Save Settings</button>
                </form>
                <div id="current-settings" class="mt-4 text-sm text-gray-600"></div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-2xl font-bold mb-4 border-b pb-2">Version Control</h2>
                <form id="version-form" class="space-y-4">
                    <input type="text" id="latest-version" placeholder="Latest Version (e.g. 1)" class="w-full px-3 py-2 border rounded-md">
                    <input type="text" id="update-link" placeholder="Update Download Link" class="w-full px-3 py-2 border rounded-md">
                    <button type="submit" class="w-full bg-green-600 text-white py-2 rounded font-bold hover:bg-green-700">Update Version</button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-2xl font-bold mb-4 border-b pb-2">Add New Skin</h2>
                <form id="skin-form" class="space-y-4">
                    <input type="text" id="img2" placeholder="Image URL" class="w-full px-3 py-2 border rounded-md" required>
                    <input type="text" id="file-url" placeholder="File Link (Mediafire/Drive)" class="w-full px-3 py-2 border rounded-md" required>
                    <textarea id="skin-details" placeholder="Add Details (Optional)" class="w-full px-3 py-2 border rounded-md" rows="2"></textarea>
                    <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded font-bold hover:bg-purple-700">Add Skin</button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-2xl font-bold mb-4 border-b pb-2">500 SUBSCRIBER 🎁</h2>
                <form id="tip-form" class="space-y-4">
                    <input type="text" id="tip-image-url" placeholder="Image URL" class="w-full px-3 py-2 border rounded-md" required>
                    <input type="text" id="tip-link-url" placeholder="Link URL (Optional)" class="w-full px-3 py-2 border rounded-md">
                    <textarea id="tip-details" placeholder="Add Details (Optional)" class="w-full px-3 py-2 border rounded-md" rows="3"></textarea>
                    <button type="submit" class="w-full bg-yellow-500 text-white py-2 rounded font-bold hover:bg-yellow-600">Add Tip</button>
                </form>
            </div>
            
            <div class="bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-2xl font-bold mb-4 border-b pb-2">Add Other App</h2>
                <form id="other-app-form" class="space-y-4">
                    <input type="text" id="other-app-image-url" placeholder="Image URL" class="w-full px-3 py-2 border rounded-md" required>
                    <input type="text" id="other-app-link-url" placeholder="App Download Link" class="w-full px-3 py-2 border rounded-md" required>
                    <textarea id="other-app-details" placeholder="Add Details (e.g., App Name)" class="w-full px-3 py-2 border rounded-md" rows="2"></textarea>
                    <button type="submit" class="w-full bg-red-600 text-white py-2 rounded font-bold hover:bg-red-700">Add App</button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-2xl font-bold mb-4 border-b pb-2">Add Slider Image</h2>
                <form id="slider-form" class="space-y-4">
                    <input type="text" id="slider-image-url" placeholder="Image URL" class="w-full px-3 py-2 border rounded-md" required>
                    <input type="text" id="slider-link-url" placeholder="Link URL (Optional)" class="w-full px-3 py-2 border rounded-md">
                    <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded font-bold hover:bg-indigo-700">Add Slider</button>
                </form>
            </div>
        </div>

        <!-- Management Sections -->
        <div class="mt-12 bg-white p-6 rounded-lg shadow-lg">
            <h2 class="text-2xl font-bold mb-4 border-b pb-2">Manage Sliders</h2>
            <div id="sliders-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </div>
        
        <div class="mt-12 bg-white p-6 rounded-lg shadow-lg">
            <h2 class="text-2xl font-bold mb-4 border-b pb-2">Manage Skins</h2>
            <div id="skins-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </div>

        <div class="mt-12 bg-white p-6 rounded-lg shadow-lg">
            <h2 class="text-2xl font-bold mb-4 border-b pb-2">Manage Tips/Mods</h2>
            <div id="tips-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </div>

        <div class="mt-12 bg-white p-6 rounded-lg shadow-lg">
            <h2 class="text-2xl font-bold mb-4 border-b pb-2">Manage Other Apps</h2>
            <div id="other-apps-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
  apiKey: "AIzaSyDDZ8idwoJVQPbpnZDAPSwaMDQdoEIGYFA",
  authDomain: "tigran-skin-tool.firebaseapp.com",
  databaseURL: "https://tigran-skin-tool-default-rtdb.firebaseio.com",
  projectId: "tigran-skin-tool",
  storageBucket: "tigran-skin-tool.firebasestorage.app",
  messagingSenderId: "660531512224",
  appId: "1:660531512224:web:614e4185f873bfc7261ac5",
  measurementId: "G-EC507NYQC5"
};
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Save Password & Link
        document.getElementById('pass-form').onsubmit = (e) => {
            e.preventDefault();
            const pass = document.getElementById('new-password').value;
            const link = document.getElementById('get-pass-link').value;
            if(pass) database.ref('config/password').set(pass);
            if(link) database.ref('config/getPassLink').set(link);
            alert("Settings Saved!");
            e.target.reset();
        };

        // Update Version
        document.getElementById('version-form').onsubmit = (e) => {
            e.preventDefault();
            const ver = document.getElementById('latest-version').value;
            const link = document.getElementById('update-link').value;
            if (ver && link) {
                database.ref('version').set({ latest: ver, link: link });
                alert("Version Updated!");
                e.target.reset();
            } else {
                alert("Please fill in both version and link fields.");
            }
        };

        // Add Skin
        document.getElementById('skin-form').onsubmit = (e) => {
            e.preventDefault();
            const skinData = {
                img2: document.getElementById('img2').value,
                file: document.getElementById('file-url').value,
                details: document.getElementById('skin-details').value
            };
            database.ref('skins').push(skinData);
            alert("Skin Added!");
            e.target.reset();
        };

        // Add Tip
        document.getElementById('tip-form').onsubmit = (e) => {
            e.preventDefault();
            const tipData = {
                imageUrl: document.getElementById('tip-image-url').value,
                linkUrl: document.getElementById('tip-link-url').value,
                details: document.getElementById('tip-details').value
            };
            database.ref('tips').push(tipData);
            alert("Tip Added!");
            e.target.reset();
        };

        // Add Slider
        document.getElementById('slider-form').onsubmit = (e) => {
            e.preventDefault();
            const sliderData = {
                imageUrl: document.getElementById('slider-image-url').value,
                linkUrl: document.getElementById('slider-link-url').value || ''
            };
            database.ref('sliders').push(sliderData);
            alert("Slider Added!");
            e.target.reset();
        };
        
        // Add Other App
        document.getElementById('other-app-form').onsubmit = (e) => {
            e.preventDefault();
            const appData = {
                imageUrl: document.getElementById('other-app-image-url').value,
                linkUrl: document.getElementById('other-app-link-url').value,
                details: document.getElementById('other-app-details').value
            };
            database.ref('otherApps').push(appData);
            alert("Other App Added!");
            e.target.reset();
        };

        // Load Current Data
        database.ref('config').on('value', (snap) => {
            const data = snap.val();
            if(data && data.password) {
                 document.getElementById('current-settings').innerHTML = `Current Password: <b>${data.password}</b>`;
            }
        });

        // Generic function to load and display items for management
        function loadItems(refName, listElementId, deleteFunctionName) {
            database.ref(refName).on('value', (snap) => {
                const list = document.getElementById(listElementId);
                list.innerHTML = '';
                snap.forEach((child) => {
                    const item = child.val();
                    const imageUrl = item.imageUrl || item.img2 || item.image2Url;
                    if(item && imageUrl) {
                        list.innerHTML += `
                            <div class="border p-2 rounded relative">
                                <img src="${imageUrl}" class="w-full h-20 object-cover rounded" onerror="this.style.display='none'">
                                <p class="text-xs truncate mt-1">${item.details || 'No details'}</p>
                                <button onclick="${deleteFunctionName}('${child.key}')" class="mt-2 bg-red-500 text-white text-xs px-2 py-1 rounded w-full">Delete</button>
                            </div>`;
                    }
                });
            });
        }

        // Setup delete functions and load all items
        window.deleteSlider = (id) => { if(confirm('Delete this slider?')) database.ref('sliders/'+id).remove(); };
        window.deleteSkin = (id) => { if(confirm('Delete this skin?')) database.ref('skins/'+id).remove(); };
        window.deleteTip = (id) => { if(confirm('Delete this tip?')) database.ref('tips/'+id).remove(); };
        window.deleteOtherApp = (id) => { if(confirm('Delete this app?')) database.ref('otherApps/'+id).remove(); };

        loadItems('sliders', 'sliders-list', 'deleteSlider');
        loadItems('skins', 'skins-list', 'deleteSkin');
        loadItems('tips', 'tips-list', 'deleteTip');
        loadItems('otherApps', 'other-apps-list', 'deleteOtherApp');
        


if(localStorage.getItem("role") !== "admin"){

    window.location.href = "index.html";

}
</script>

</body>
</html>
